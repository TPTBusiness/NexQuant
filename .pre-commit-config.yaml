# Pre-commit hooks configuration for Predix
# See https://pre-commit.com for more information

repos:
  # ── Qlib Unit Tests (MANDATORY) ──────────────────────────────────
  - repo: local
    hooks:
      - id: qlib-unit-tests
        name: Qlib Unit Tests (~360 tests)
        entry: pytest
        language: system
        args:
          - test/qlib/
          - test/backtesting/
          - -v
          - --tb=short
          - --no-cov
          - --ignore=test/backtesting/test_ftmo_oos.py
          - --ignore=test/backtesting/test_kronos_adapter.py
          - --ignore=test/backtesting/test_results_db.py
          - --ignore=test/qlib/test_fin_quant_integration.py
        pass_filenames: false
        always_run: true

  # ── Security Scanning (MANDATORY) ─────────────────────────────────
  - repo: local
    hooks:
      - id: bandit-security-scan
        name: Bandit Security Scan
        entry: bandit
        language: system
        args:
          - -r
          - rdagent/
          - -c
          - .bandit.yml
          - --severity-level=medium
          - --confidence-level=medium
          - --format=txt
        pass_filenames: false
        always_run: true
